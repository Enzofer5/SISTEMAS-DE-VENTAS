<h2 class="titulo-panel">📊 Historial de Ventas</h2>

<table>

<tr>
<th>ID</th>
<th>Fecha</th>
<th>Vendedor</th>
<th>Total</th>
</tr>

{% for venta in ventas %}

<tr>

<td>
<a href="/detalle_venta/{{ venta.id }}">
{{ venta.id }}
</a>
</td>

<td>{{ venta.fecha }}</td>

<td>{{ venta.vendedor }}</td>

<td class="verde">${{ venta.total }}</td>

</tr>

{% endfor %}

</table>

<br>

<a class="volver" href="/dashboard">⬅ Volver</a>
